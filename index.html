<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>HSIL Sommerutfordring 2026</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Segoe UI',system-ui,sans-serif;background:#eaf2fb;min-height:100vh;}
    #app{max-width:480px;margin:0 auto;padding-bottom:40px;}

    .hero{background:linear-gradient(135deg,#1a3461 0%,#2556a0 60%,#3a74c4 100%);
      color:#fff;text-align:center;padding:32px 20px 24px;border-radius:0 0 24px 24px;}
    .hero h1{font-size:28px;font-weight:900;letter-spacing:2px;margin:8px 0 2px;}
    .hero-sub{font-size:12px;font-weight:700;letter-spacing:3px;opacity:.85;}
    .hero-tagline{font-size:14px;margin-top:8px;opacity:.9;}

    .card{background:#fff;border-radius:16px;margin:12px 12px 0;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.08);}
    .team-label{font-weight:700;font-size:15px;color:#374151;margin-bottom:4px;}
    .team-points{font-size:48px;font-weight:900;color:#2556a0;line-height:1.1;margin-bottom:10px;}
    .motto{font-size:13px;color:#6b7280;text-align:center;margin-top:10px;}

    .goal-bar{margin-bottom:10px;}
    .goal-bar-top{display:flex;justify-content:space-between;font-size:13px;margin-bottom:3px;}
    .goal-bar-top span:last-child{font-weight:600;}
    .progress-track{height:10px;background:#e5e7eb;border-radius:99px;overflow:hidden;}
    .progress-fill{height:100%;border-radius:99px;transition:width .4s;background:#f59e0b;}
    .progress-fill.done{background:#2556a0;}

    /* TEAM SELECT */
    .team-select-row{display:flex;gap:10px;margin:12px 12px 0;}
    .team-select-btn{flex:1;padding:16px 8px;border-radius:14px;border:2px solid #a8c8e8;
      background:#fff;font-size:15px;font-weight:700;cursor:pointer;color:#1a3461;text-align:center;}
    .team-select-btn.active{border-color:#2556a0;background:#eaf2fb;}
    .team-select-btn .team-tag{font-size:11px;opacity:.7;display:block;margin-top:2px;font-weight:500;}

    .section-title{font-weight:700;font-size:16px;color:#374151;margin-bottom:10px;}
    .player-list{display:flex;flex-direction:column;gap:8px;}
    .player-btn{display:flex;align-items:center;gap:10px;background:#eaf2fb;
      border:1.5px solid #a8c8e8;border-radius:10px;padding:12px 14px;
      cursor:pointer;text-align:left;width:100%;}
    .player-emoji{font-size:22px;}
    .player-name{flex:1;font-weight:600;font-size:15px;color:#1a3461;}
    .player-pts{font-size:13px;color:#6b7280;font-weight:600;}

    .role-row{display:flex;gap:10px;margin-bottom:16px;}
    .role-btn{flex:1;padding:14px 8px;border-radius:12px;border:2px solid #e5e7eb;
      background:#f9fafb;font-size:15px;font-weight:600;cursor:pointer;color:#374151;}
    .role-btn.active{border-color:#2556a0;background:#eaf2fb;color:#1a3461;}
    .role-btn.trainer-active{border-color:#7c3aed;background:#faf5ff;color:#7c3aed;}

    .form-card{background:#fff;border-radius:16px;margin:12px 12px 0;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,.08);}
    .form-title{font-weight:800;font-size:18px;color:#1a3461;margin-bottom:6px;}
    .form-title.trainer{color:#7c3aed;}
    .form-sub{font-size:14px;color:#6b7280;margin-bottom:16px;}
    .form-label{font-size:13px;font-weight:600;color:#374151;margin-bottom:4px;display:block;}
    .name-input{width:100%;padding:12px 14px;border-radius:10px;border:2px solid #a8c8e8;
      font-size:16px;outline:none;margin-bottom:12px;}
    .name-input:focus{border-color:#2556a0;}
    .name-input.trainer-input:focus{border-color:#7c3aed;}
    .submit-btn{width:100%;padding:13px;background:#2556a0;color:#fff;border:none;
      border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;}
    .submit-btn.trainer{background:#7c3aed;}
    .submit-btn:active{opacity:.85;}
    .form-error{color:#dc2626;font-size:13px;margin-top:8px;}
    .back-link{text-align:center;margin-top:14px;}
    .back-link button{background:none;border:none;color:#2556a0;font-weight:600;cursor:pointer;font-size:14px;text-decoration:underline;}

    .nav-row{display:flex;gap:10px;margin:12px 12px 0;}
    .nav-btn{flex:1;background:#fff;border:1.5px solid #d1d5db;border-radius:10px;
      padding:12px 8px;font-weight:600;font-size:14px;cursor:pointer;color:#374151;}

    .top-bar{display:flex;align-items:center;gap:12px;padding:14px 14px 0;margin-bottom:4px;}
    .back-btn{background:none;border:none;font-size:15px;color:#2556a0;font-weight:600;cursor:pointer;padding:0;}
    .top-title{font-weight:800;font-size:18px;color:#1a3461;flex:1;}
    .trainer-badge{background:#7c3aed;color:#fff;font-size:11px;font-weight:700;padding:3px 8px;border-radius:99px;}
    .team-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:99px;background:#2556a0;color:#fff;}

    .big-points{font-size:56px;font-weight:900;color:#2556a0;line-height:1;}
    .level-badge{font-weight:700;font-size:22px;margin-top:4px;}
    .progress-label{font-size:13px;color:#6b7280;margin-bottom:4px;margin-top:10px;}

    .cat-title{font-weight:800;font-size:15px;margin-bottom:10px;}
    .act-row{display:flex;justify-content:space-between;align-items:center;
      padding-bottom:10px;margin-bottom:10px;border-bottom:1px solid #f3f4f6;}
    .act-row:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
    .act-info{flex:1;padding-right:8px;}
    .act-label{font-size:14px;color:#374151;font-weight:500;display:block;}
    .act-sub{font-size:12px;color:#9ca3af;}
    .act-controls{display:flex;align-items:center;gap:6px;}
    .counter-btn{width:32px;height:32px;border-radius:8px;border:none;
      font-size:18px;font-weight:700;cursor:pointer;color:#374151;background:#f3f4f6;}
    .counter-btn.plus{background:#2556a0;color:#fff;}
    .counter-btn.plus.disabled{background:#d1d5db;cursor:default;}
    .counter-val{min-width:28px;text-align:center;font-weight:700;font-size:16px;color:#111827;}
    .free-input{width:58px;padding:6px 8px;border-radius:8px;border:1.5px solid #d1d5db;font-size:15px;text-align:center;}
    .free-input.locked{background:#f9fafb;color:#9ca3af;}

    .trikse-card{background:#fff;border-radius:16px;margin:12px 12px 0;padding:16px;
      box-shadow:0 1px 4px rgba(0,0,0,.08);border-left:4px solid #f59e0b;}
    .trikse-title{font-weight:800;font-size:15px;color:#d97706;margin-bottom:4px;}
    .trikse-record{font-size:40px;font-weight:900;color:#d97706;line-height:1;}
    .trikse-sub{font-size:13px;color:#9ca3af;margin-top:2px;margin-bottom:12px;}
    .trikse-input-row{display:flex;gap:8px;align-items:center;margin-bottom:12px;}
    .trikse-input{flex:1;padding:10px 12px;border-radius:10px;border:2px solid #fde68a;
      font-size:18px;font-weight:700;text-align:center;outline:none;}
    .trikse-input:focus{border-color:#f59e0b;}
    .trikse-btn{padding:10px 16px;background:#f59e0b;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;}
    .trikse-log{margin-top:8px;}
    .trikse-log-row{display:flex;justify-content:space-between;align-items:center;
      padding:6px 0;border-bottom:1px solid #f3f4f6;font-size:14px;}
    .trikse-log-row:last-child{border-bottom:none;}
    .trikse-log-date{color:#6b7280;}
    .trikse-log-val{font-weight:700;color:#d97706;}
    .trikse-pb{color:#2556a0;font-size:11px;font-weight:700;margin-left:6px;}

    .trainer-select{width:100%;padding:10px 12px;border-radius:10px;border:2px solid #ddd6fe;
      font-size:15px;outline:none;margin-bottom:12px;background:#faf5ff;}
    .bonus-row{display:flex;align-items:center;gap:10px;}
    .bonus-input{flex:1;padding:10px 12px;border-radius:10px;border:2px solid #ddd6fe;
      font-size:16px;outline:none;text-align:center;}
    .bonus-btn{padding:10px 18px;background:#7c3aed;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;}

    .drive-card{background:#eff6ff;border:1.5px solid #bfdbfe;border-radius:16px;
      margin:12px 12px 0;padding:16px;text-align:center;}
    .drive-btn{display:inline-flex;align-items:center;gap:10px;background:#1d4ed8;
      color:#fff;border:none;border-radius:12px;padding:14px 24px;font-size:16px;font-weight:700;text-decoration:none;}
    .drive-hint{font-size:13px;color:#6b7280;margin-top:10px;}

    .lb-row{display:flex;align-items:center;gap:10px;padding:9px 6px;border-radius:8px;margin-bottom:2px;}
    .lb-rank{width:24px;font-weight:700;color:#9ca3af;font-size:14px;}
    .lb-emoji{font-size:20px;}
    .lb-name{flex:1;font-weight:600;color:#374151;}
    .lb-pts{font-weight:800;color:#2556a0;font-size:15px;}

    .info-section{margin-bottom:16px;line-height:1.9;}
    .info-section b{display:block;margin-bottom:4px;}
  </style>
</head>

function team() { return currentTeamId ? TEAMS[currentTeamId] : null; }
function teamData() { return allData[currentTeamId] || {}; }
function teamPlayers() { return playerList[currentTeamId] || []; }

// ─── Firebase ─────────────────────────────────────────────────────────────────
function fbUrl(path) { return `${FIREBASE_URL}/${path}.json`; }
async function fbGet(path) { try { const r=await fetch(fbUrl(path)); return r.ok?r.json():null; } catch{return null;} }
async function fbSet(path, data) { try { await fetch(fbUrl(path),{method:"PUT",body:JSON.stringify(data)}); } catch{} }

async function loadTeam(teamId) {
  loading = true; render();
  const data = await fbGet(`teams/${teamId}`);
  allData[teamId] = data || {};
  playerList[teamId] = [];
  for (const key of Object.keys(allData[teamId]||{})) {
    const name = allData[teamId][key]?.__name__;
    if (name) playerList[teamId].push(name);
  }
  loading = false; render();
}

// ─── Points ───────────────────────────────────────────────────────────────────
function calcPoints(logs, teamId) {
  const t = TEAMS[teamId];
  if (!t||!logs) return 0;
  let pts = 0;
  for (const cat of t.activities)
    for (const item of cat.items) {
      const c = logs[item.id]||0;
      if (item.max) pts += Math.min(c,item.max)*item.points;
      else pts += c*item.points;
    }
  pts += logs.trenerbonus||0;
  pts += Object.keys(logs.trikserekord_log||{}).length;
  return pts;
}

function getLevel(pts, teamId) {
  const levels = TEAMS[teamId]?.levels||[];
  let l=null; for(const x of levels) if(pts>=x.min) l=x; return l;
}
function getNextLevel(pts, teamId) {
  const levels = TEAMS[teamId]?.levels||[];
  for(const x of levels) if(pts<x.min) return x; return null;
}
function playerKey(name) { return name.toLowerCase().replace(/\s+/g,"_").replace(/[^a-z0-9_]/g,""); }

function teamTotal(teamId) {
  return Object.keys(allData[teamId]||{}).reduce((s,k)=>s+calcPoints(allData[teamId][k],teamId),0);
}

// ─── Save ─────────────────────────────────────────────────────────────────────
async function savePlayerData(name, logs) {
  saveStatus="saving"; render();
  const key=playerKey(name);
  await fbSet(`teams/${currentTeamId}/${key}`, {...logs,__name__:name});
  allData[currentTeamId][key] = {...logs,__name__:name};
  saveStatus="saved"; render();
  setTimeout(()=>{saveStatus="";render();},2500);
}

async function saveTrainerBonus(playerName, pts) {
  const key=playerKey(playerName);
  const logs={...(allData[currentTeamId][key]||{}),trenerbonus:pts,__name__:playerName};

// ─── Register ─────────────────────────────────────────────────────────────────
function hashPin(pin) { let hv=0; for(let i=0;i<pin.length;i++){hv=((hv<<5)-hv)+pin.charCodeAt(i);hv|=0;} return hv.toString(36); }

async function registerPlayer(name, code, pin) {
  if(!name){formError="Skriv inn fullt navn.";render();return;}
  if(!name.includes(" ")){formError="Skriv fornavn og etternavn.";render();return;}
  if(code!==team().playerCode){formError="Feil lagkode. Spør en trener!";render();return;}
  if(!pin||pin.length!==4||!/^\d{4}$/.test(pin)){formError="PIN-kode må være 4 siffer.";render();return;}
  const key=playerKey(name);
  const existingData=await fbGet(`teams/${currentTeamId}/${key}`);
  if(existingData&&existingData.__name__&&existingData.__name__!==name){formError="En spiller med dette navnet finnes allerede.";render();return;}
  if(existingData&&existingData.__pin__){formError="Denne spilleren er allerede registrert. Logg inn fra listen.";render();return;}
  const pinHash=hashPin(pin);
  if(!allData[currentTeamId]) allData[currentTeamId]={};
  if(!allData[currentTeamId][key]) allData[currentTeamId][key]={};
  await fbSet(`teams/${currentTeamId}/${key}/__name__`,name);
  await fbSet(`teams/${currentTeamId}/${key}/__pin__`,pinHash);
  allData[currentTeamId][key].__name__=name;
  allData[currentTeamId][key].__pin__=pinHash;
  if(!playerList[currentTeamId]) playerList[currentTeamId]=[];
  if(!playerList[currentTeamId].includes(name)) playerList[currentTeamId].push(name);
  localStorage.setItem(STORAGE_KEY,JSON.stringify({name,role:"player",teamId:currentTeamId,pinHash}));
  currentPlayer=name; isTrainer=false; saveStatus=""; view="player"; render();
}

async function loginWithPin(name, pin) {
  if(!pin||pin.length!==4){formError="Skriv inn 4-sifret PIN.";render();return;}
  const key=playerKey(name);
  const data=await fbGet(`teams/${currentTeamId}/${key}`);
  if(!data){formError="Spilleren finnes ikke.";render();return;}
  // If no PIN set yet, allow login and redirect to set PIN
  if(!data.__pin__){
    allData[currentTeamId][key]=data;
    currentPlayer=name;
    localStorage.setItem(STORAGE_KEY,JSON.stringify({name,role:"player",teamId:currentTeamId}));
    saveStatus=""; view="set-pin"; render(); return;
  }
  if(hashPin(pin)!==data.__pin__){formError="Feil PIN-kode. Prøv igjen.";render();return;}
  allData[currentTeamId][key]=data;
  currentPlayer=name;
  const pinHash=data.__pin__;
  localStorage.setItem(STORAGE_KEY,JSON.stringify({name,role:"player",teamId:currentTeamId,pinHash}));
  saveStatus=""; view="player"; render();
}

async function setPin(name, pin, pin2) {
  if(!pin||pin.length!==4||!/^\d{4}$/.test(pin)){formError="PIN-kode må være 4 siffer.";render();return;}
  if(pin!==pin2){formError="PIN-kodene er ikke like. Prøv igjen.";render();return;}
  const key=playerKey(name);
  const pinHash=hashPin(pin);
  await fbSet(`teams/${currentTeamId}/${key}/__pin__`,pinHash);
  if(allData[currentTeamId][key]) allData[currentTeamId][key].__pin__=pinHash;
  localStorage.setItem(STORAGE_KEY,JSON.stringify({name,role:"player",teamId:currentTeamId,pinHash}));
  currentPlayer=name; view="player"; formError=""; render();
}

async function adminDeletePlayer(teamId, name) {
  const key=playerKey(name);
  await fbSet(`teams/${teamId}/${key}`,null);
  if(allData[teamId]) delete allData[teamId][key];
  if(playerList[teamId]) playerList[teamId]=playerList[teamId].filter(n=>n!==name);
  bonusSaveMsg=`✓ ${name} er slettet`;
  render();
  setTimeout(()=>{bonusSaveMsg="";render();},3000);
}

async function adminResetPin(teamId, name) {
  const key=playerKey(name);
  // Remove pin field
  const data=allData[teamId]?.[key]||{};
  delete data.__pin__;
  await fbSet(`teams/${teamId}/${key}/__pin__`,null);
  if(allData[teamId]?.[key]) delete allData[teamId][key].__pin__;
  bonusSaveMsg=`✓ PIN resatt for ${name}. Spilleren kan nå logge inn og velge ny PIN.`;
  render();
  setTimeout(()=>{bonusSaveMsg="";render();},4000);
}

function loginTrainer(code) {
  const t=team();
  if(code!==t.trainerCode){formError="Feil trenerkode.";render();return;}
  localStorage.setItem(STORAGE_KEY,JSON.stringify({role:"trainer",teamId:currentTeamId}));
  isTrainer=true; currentPlayer=null;
  trainerTarget=teamPlayers()[0]||null; view="trainer"; render();
}

function loginAdmin(code) {
  if(code!==ADMIN_CODE){formError="Feil admin-kode.";render();return;}
  localStorage.setItem(STORAGE_KEY,JSON.stringify({role:"admin"}));
  isAdmin=true; isTrainer=false; currentTeamId=null;
  view="admin"; render();
}

function goalBar(total,goal,label) {
  const pct=Math.min(100,(total/goal)*100),done=total>=goal;
  return `<div class="goal-bar">

    <div class="progress-track"><div class="progress-fill${done?" done":""}" style="width:${pct}%"></div></div>
  </div>`;
}

      <span style="font-weight:800;font-size:20px;color:#7c3aed">${logs.trenerbonus||0} p</span>
    </div>
  </div>
  <div class="trikse-card">
    <div class="trikse-title">🎯 Trikserekord</div>
    ${(()=>{
      const log=logs.trikserekord_log||{};
      const entries=Object.entries(log).sort((a,b)=>b[0].localeCompare(a[0]));
      const best=entries.reduce((m,[,v])=>Math.max(m,v),0);
      const todayKey=new Date().toISOString().slice(0,10);
      const todayVal=log[todayKey]||0;
      const dayCount=entries.length;
      return `
        <div class="trikse-record">${best||"–"}</div>

        </div>
        ${entries.length?`<div class="trikse-log">
          ${entries.slice(0,10).map(([date,val],i)=>{
            const isPB=val===best&&i===entries.findIndex(([,v])=>v===best);
            return `<div class="trikse-log-row">
              <span class="trikse-log-date">${date}</span>
              <span class="trikse-log-val">${val} triksinger${isPB?"<span class='trikse-pb'>PB!</span>":""}</span>

}

function renderTrainer() {
  const t=team();
  const sorted=teamPlayers().slice().sort();
  const total=teamTotal(currentTeamId);
  const target=trainerTarget||(sorted[0]||"");
  const currentBonus=target?((allData[currentTeamId][playerKey(target)]||{}).trenerbonus||0):0;
  return `
  <div class="top-bar">
    <button class="back-btn" id="go-team">← Hjem</button>
    <span class="top-title">Trenervisning</span>
    <span class="trainer-badge">🏅 ${t.name}</span>
  </div>
  <div style="text-align:right;margin:6px 12px 0">
    <button id="go-admin" style="background:#374151;color:#fff;border:none;border-radius:8px;padding:6px 14px;font-size:13px;font-weight:600;cursor:pointer">⚙️ Administrasjon</button>
  </div>
  <div class="card">
    <div class="team-label">🏆 ${t.name} – lagstotal: ${total} poeng</div>
    ${t.goals.map(g=>goalBar(total,g.pts,g.label)).join("")}
  </div>
  <div class="card">
    <div class="cat-title" style="color:#7c3aed">⭐ Gi trenerbonus</div>
    <label class="form-label">Velg spiller</label>
    <select class="trainer-select" id="trainer-player-select">
      ${sorted.map(n=>`<option value="${n}" ${n===target?"selected":""}>${n}</option>`).join("")}
    </select>
    <label class="form-label">Poeng (nåværende: ${currentBonus})</label>
    <div class="bonus-row">
      <input class="bonus-input" id="bonus-input" type="number" min="0" value="${currentBonus}" placeholder="0"/>
      <button class="bonus-btn" id="save-bonus">Lagre</button>
    </div>
    ${bonusSaveMsg?`<div style="color:#2556a0;font-weight:600;margin-top:10px;font-size:14px">${bonusSaveMsg}</div>`:""}
  </div>
  <div class="card">
    <div class="cat-title" style="color:#374151">📊 Alle spillere – trykk for detaljer</div>
    ${sorted.length===0?`<div style="color:#9ca3af">Ingen spillere registrert ennå.</div>`:""}
    ${sorted.map((name,i)=>{
      const pts=calcPoints(allData[currentTeamId][playerKey(name)],currentTeamId);
      const lvl=getLevel(pts,currentTeamId);
      return `<button class="player-btn" data-trainer-detail="${name}" style="background:${i<3?"#fef9c3":"#eaf2fb"};margin-bottom:4px">
        <span class="player-emoji">${lvl?lvl.emoji:"🎽"}</span>
        <span class="player-name">${name}</span>
        <span class="player-pts">${pts>0?pts+" p":"–"} →</span>
      </button>`;
    }).join("")}
  </div>
  <div style="height:32px"></div>`;
}

// ─── TRAINER DETAIL ───────────────────────────────────────────────────────────
function renderTrainerDetail() {
  const t=team();
  const name=trainerDetailPlayer;
  const key=playerKey(name);
  const logs=allData[currentTeamId][key]||{};
  const pts=calcPoints(logs,currentTeamId);
  const lvl=getLevel(pts,currentTeamId);
  const next=getNextLevel(pts,currentTeamId);
  const pct=next?Math.min(100,(pts/next.min)*100):100;
  const currentBonus=logs.trenerbonus||0;

  return `
  <div class="top-bar">
    <button class="back-btn" id="go-trainer-back">← Tilbake</button>
    <span class="top-title">${name}</span>
    <span class="trainer-badge">🏅 TRENER</span>
  </div>
  <div class="card" style="text-align:center">
    <div class="big-points">${pts} poeng</div>
    ${lvl?`<div class="level-badge" style="color:${lvl.color}">${lvl.emoji} ${lvl.name}!</div>`:""}
    ${next?`<div class="progress-label">Neste: ${next.emoji} ${next.name} – ${next.min-pts} poeng igjen</div>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>`:""}
    ${!next&&lvl?`<div style="margin-top:8px;color:#7c3aed;font-weight:700">💎 Toppnivå nådd! 🎉</div>`:""}
  </div>
  ${t.activities.map(cat=>`
    <div class="card">
      <div class="cat-title" style="color:${cat.color}">${cat.label}</div>
      ${cat.items.map(item=>{
        const val=logs[item.id]||0;
        const earned=item.max?Math.min(val,item.max)*item.points:val*item.points;
        return `<div class="act-row">
          <div class="act-info">
            <span class="act-label">${item.label}</span>
            <span class="act-sub">+${item.points} p / ${item.unit}</span>
          </div>
          <div style="text-align:right">
            <div style="font-weight:700;font-size:16px;color:#111827">${val}${item.max?"/"+item.max:""}</div>
            <div style="font-size:12px;color:#9ca3af">${earned} p</div>
          </div>
        </div>`;
      }).join("")}
    </div>`).join("")}
  <div class="trikse-card">
    <div class="trikse-title">🎯 Trikserekord</div>
    ${(()=>{
      const log=logs.trikserekord_log||{};
      const entries=Object.entries(log).sort((a,b)=>b[0].localeCompare(a[0]));
      const best=entries.reduce((m,[,v])=>Math.max(m,v),0);
      return `<div class="trikse-record">${best||"–"}</div>
        <div class="trikse-sub">${best?"Personlig rekord 🏆":"Ingen rekord ennå"} · ${entries.length} dager logget</div>
        ${entries.length?`<div class="trikse-log">${entries.slice(0,8).map(([d,v])=>`
          <div class="trikse-log-row"><span class="trikse-log-date">${d}</span><span class="trikse-log-val">${v}</span></div>`).join("")}</div>`:"" }`;
    })()}
  </div>
  <div class="card" style="border:2px solid #ddd6fe">
    <div class="cat-title" style="color:#7c3aed">⭐ Gi/endre trenerbonus</div>
    <div class="act-row">
      <div class="act-info">
        <span class="act-label">Trenerbonus</span>
        <span class="act-sub">Nåværende: ${currentBonus} poeng</span>
      </div>
      <div class="bonus-row">
        <input class="bonus-input" id="detail-bonus-input" type="number" min="0" value="${currentBonus}" style="width:70px"/>
        <button class="bonus-btn" id="detail-save-bonus">Lagre</button>
      </div>
    </div>
    ${bonusSaveMsg?`<div style="color:#2556a0;font-weight:600;margin-top:8px;font-size:14px">${bonusSaveMsg}</div>`:""}
  </div>
  <div style="height:32px"></div>`;
}

// ─── LEADERBOARD ──────────────────────────────────────────────────────────────
function renderLeaderboard() {
  const t=team();
  const total=teamTotal(currentTeamId);
  const board=teamPlayers().map(n=>{return {name:n,pts:calcPoints(allData[currentTeamId][playerKey(n)],currentTeamId)}}).sort((a,b)=>b.pts-a.pts);
  return `
  <div class="top-bar">
    <button class="back-btn" id="go-team">← Tilbake</button>
    <span class="top-title">📊 ${t.name} Poengtavle</span>
  </div>
  <div class="card">
    <div class="team-label">🏆 ${t.name} – ${total} poeng</div>
    ${t.goals.map(g=>goalBar(total,g.pts,g.label)).join("")}
  </div>
  <div class="card">
    ${board.length===0?`<div style="color:#9ca3af;text-align:center;padding:20px">Ingen har registrert seg ennå!</div>`:""}
    ${board.map((p,i)=>{
      const lvl=getLevel(p.pts,currentTeamId);
      return `<div class="lb-row" style="background:${i<3?"#fefce8":"transparent"}">
        <span class="lb-rank">${i+1}.</span>
        <span class="lb-emoji">${lvl?lvl.emoji:"🎽"}</span>
        <span class="lb-name">${p.name}</span>
        <span class="lb-pts">${p.pts>0?p.pts+" p":"–"}</span>
      </div>`;
    }).join("")}
  </div>`;
}

// ─── EVENTS ───────────────────────────────────────────────────────────────────
function attachEvents() {
  // Home: team select
  document.querySelectorAll(".team-select-btn").forEach(btn=>{
    btn.addEventListener("click",async ()=>{
      currentTeamId=btn.dataset.team;
      await loadTeam(currentTeamId);
      view="team-select"; render();
    });
  });

  // Admin login from home
  const goAdminLogin=document.getElementById("go-admin-login");
  if(goAdminLogin) goAdminLogin.addEventListener("click",()=>{
    selectedRole="admin"; formError="";
    // Admin doesn't need a team - show register form from home context
    // Store that we came from home for back button
    currentTeamId=currentTeamId||Object.keys(TEAMS)[0];
    view="register"; render();
  });

  // Go home
  document.querySelectorAll("#go-home-btn").forEach(btn=>{
    btn.addEventListener("click",()=>{currentTeamId=null;view="home";render();});
  });

  // Go to team home
  document.querySelectorAll("#go-team").forEach(btn=>{
    btn.addEventListener("click",async ()=>{await loadTeam(currentTeamId);view="team-select";render();});
  });

  // Go register
  const goReg=document.getElementById("go-register");
  if(goReg) goReg.addEventListener("click",()=>{formError="";view="register";render();});

  // Back to team from register
  document.querySelectorAll("#go-back-team").forEach(btn=>{
    btn.addEventListener("click",()=>{view="team-select";render();});
  });

  // Role toggle
  document.querySelectorAll(".role-btn").forEach(btn=>{
    btn.addEventListener("click",()=>{selectedRole=btn.dataset.role;formError="";render();});
  });

  // Register player
  const doReg=document.getElementById("do-register");
  if(doReg){
    const ni=document.getElementById("name-input");
    const ci=document.getElementById("code-input");
    if(ni){ni.focus();ni.addEventListener("keydown",e=>{if(e.key==="Enter")ci&&ci.focus();});}
    if(ci) ci.addEventListener("keydown",e=>{if(e.key==="Enter")doReg.click();});
    const pi=document.getElementById("pin-input");
    if(pi) pi.addEventListener("keydown",e=>{if(e.key==="Enter")doReg.click();});
    doReg.addEventListener("click",()=>{registerPlayer(ni?ni.value.trim():"",ci?ci.value.trim():"",pi?pi.value.trim():"");});
  }

  // Admin login
  const doAdminLogin=document.getElementById("do-admin-login");
  if(doAdminLogin){
    const ai=document.getElementById("admin-code-input");
    if(ai){ai.focus();ai.addEventListener("keydown",e=>{if(e.key==="Enter")doAdminLogin.click();});}
    doAdminLogin.addEventListener("click",()=>{loginAdmin(ai?ai.value.trim():"");});
  }

  // Trainer login
  const doTr=document.getElementById("do-trainer-login");
  if(doTr){
    const ti=document.getElementById("trainer-code-input");
    if(ti){ti.focus();ti.addEventListener("keydown",e=>{if(e.key==="Enter")doTr.click();});}
    doTr.addEventListener("click",()=>{loginTrainer(ti?ti.value.trim():"");});
  }

  // Set PIN screen
  const doSetPin=document.getElementById("do-set-pin");
  if(doSetPin){
    const sp1=document.getElementById("set-pin-1");
    const sp2=document.getElementById("set-pin-2");
    if(sp1) sp1.focus();
    if(sp2) sp2.addEventListener("keydown",e=>{if(e.key==="Enter")doSetPin.click();});
    doSetPin.addEventListener("click",()=>{
      setPin(currentPlayer,sp1?sp1.value.trim():"",sp2?sp2.value.trim():"");
    });
  }

  // Admin button (from trainer view)
  const goAdmin=document.getElementById("go-admin");
  if(goAdmin) goAdmin.addEventListener("click",()=>{
    Promise.all(Object.keys(TEAMS).map(id=>loadTeam(id))).then(()=>{ view="admin"; render(); });
  });

  // Back from admin (trainer)
  const goTrainerFromAdmin=document.getElementById("go-trainer-from-admin");
  if(goTrainerFromAdmin) goTrainerFromAdmin.addEventListener("click",()=>{view="trainer";render();});

  // Admin home: choose team
  document.querySelectorAll("[data-admin-team]").forEach(btn=>{
    btn.addEventListener("click",async ()=>{
      currentTeamId=btn.dataset.adminTeam;
      await loadTeam(currentTeamId);
      view="admin"; render();
    });
  });

  // Back to admin home from admin panel
  const goAdminHome=document.getElementById("go-admin-home");
  if(goAdminHome) goAdminHome.addEventListener("click",()=>{currentTeamId=null;view="admin-home";render();});

  // Admin logout
  const adminLogout=document.getElementById("admin-logout");
  if(adminLogout) adminLogout.addEventListener("click",()=>{
    isAdmin=false; currentTeamId=null;
    localStorage.removeItem(STORAGE_KEY);
    view="home"; render();
  });

  // PIN login screen events
  const doPinLogin=document.getElementById("do-pin-login");
  if(doPinLogin){
    const pli=document.getElementById("pin-login-input");
    if(pli){pli.focus();pli.addEventListener("keydown",e=>{if(e.key==="Enter")doPinLogin.click();});}
    doPinLogin.addEventListener("click",()=>{
      loginWithPin(pinLoginTarget,pli?pli.value.trim():"");
    });
  }

  // Quick login from player list – PIN login
  document.querySelectorAll(".player-btn[data-player]").forEach(btn=>{
    btn.addEventListener("click",()=>{
      pinLoginTarget=btn.dataset.player;
      formError="";
      view="pin-login";
      render();
    });
  });

  // Nav
  const goLb=document.getElementById("go-leaderboard");
  if(goLb) goLb.addEventListener("click",()=>{view="leaderboard";render();});
  const goInfo=document.getElementById("go-info");
  if(goInfo) goInfo.addEventListener("click",()=>{view="info";render();});

  // Trainer player select
  const tps=document.getElementById("trainer-player-select");
  if(tps) tps.addEventListener("change",()=>{trainerTarget=tps.value;bonusSaveMsg="";render();});

  // Trainer save bonus
  const sb=document.getElementById("save-bonus");
  if(sb) sb.addEventListener("click",()=>{
    const bi=document.getElementById("bonus-input");
    const pts=Math.max(0,parseInt(bi?bi.value:0)||0);
    if(trainerTarget) saveTrainerBonus(trainerTarget,pts);
  });

  // Trainer detail
  document.querySelectorAll("[data-trainer-detail]").forEach(btn=>{
    btn.addEventListener("click",()=>{
      trainerDetailPlayer=btn.dataset.trainerDetail;
      bonusSaveMsg="";
      const key=playerKey(trainerDetailPlayer);
      fbGet(`teams/${currentTeamId}/${key}`).then(data=>{if(data)allData[currentTeamId][key]=data;render();});
      view="trainer-detail"; render();
    });
  });

  const gtb=document.getElementById("go-trainer-back");
  if(gtb) gtb.addEventListener("click",()=>{bonusSaveMsg="";view="trainer";render();});

  const dsb=document.getElementById("detail-save-bonus");
  if(dsb) dsb.addEventListener("click",async()=>{
    const bi=document.getElementById("detail-bonus-input");
    const pts=Math.max(0,parseInt(bi?bi.value:0)||0);
    if(trainerDetailPlayer){
      await saveTrainerBonus(trainerDetailPlayer,pts);
      const key=playerKey(trainerDetailPlayer);
      await fbGet(`teams/${currentTeamId}/${key}`).then(data=>{if(data)allData[currentTeamId][key]=data;});
      render();
    }
  });

  // Trikserekord
  const saveTrikse=document.getElementById("save-trikse");
  if(saveTrikse) saveTrikse.addEventListener("click",async()=>{
    const input=document.getElementById("trikse-input");
    const val=Math.max(0,parseInt(input?input.value:0)||0);
    if(!val) return;
    const todayKey=new Date().toISOString().slice(0,10);
    const key=playerKey(currentPlayer);
    const logs={...(allData[currentTeamId][key]||{})};
    if(!logs.trikserekord_log) logs.trikserekord_log={};
    logs.trikserekord_log[todayKey]=val;
    allData[currentTeamId][key]=logs;
    savePlayerData(currentPlayer,logs);
  });

  // Counter buttons
  document.querySelectorAll(".counter-btn.minus").forEach(btn=>{
    btn.addEventListener("click",()=>{
      const id=btn.dataset.id,val=parseInt(btn.dataset.val)||0;
      if(val<=0) return;
      const key=playerKey(currentPlayer);
      const logs={...(allData[currentTeamId][key]||{}),[id]:val-1};
      allData[currentTeamId][key]=logs;
      savePlayerData(currentPlayer,logs);
    });
  });
  document.querySelectorAll(".counter-btn.plus:not(.disabled)").forEach(btn=>{
    btn.addEventListener("click",()=>{
      const id=btn.dataset.id,val=parseInt(btn.dataset.val)||0;
      const max=btn.dataset.max?parseInt(btn.dataset.max):null;
      if(max&&val>=max) return;
      const key=playerKey(currentPlayer);
      const logs={...(allData[currentTeamId][key]||{}),[id]:val+1};
      allData[currentTeamId][key]=logs;
      savePlayerData(currentPlayer,logs);
    });
  });
}

// ─── Init ─────────────────────────────────────────────────────────────────────
async function init() {
  // Load both teams in background for home page totals
  await Promise.all(Object.keys(TEAMS).map(id=>loadTeam(id)));
  loading=false;

  if(session) {
    if(session.role==="admin"){
      isAdmin=true; view="admin-home";
    } else {
      currentTeamId=session.teamId||null;
      if(currentTeamId) {
        if(session.role==="trainer"){isTrainer=true;trainerTarget=teamPlayers()[0]||null;view="trainer";}
        else if(session.role==="player"&&session.name){
          const key=playerKey(session.name);
          const stored=allData[currentTeamId]?.[key];
          if(stored&&stored.__name__&&session.pinHash&&stored.__pin__===session.pinHash){
            currentPlayer=session.name;view="player";
          } else {view="team-select";}
        }
      }
    }
  }
  render();
}
init();
</script>
</body>
</html>
